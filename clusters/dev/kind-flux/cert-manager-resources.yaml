apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-resources
  namespace: flux-system
spec:
  interval: 5m
  dependsOn:
    - name: cert-manager
  path: ./clusters/dev/kind-flux/resources/cert-manager
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
