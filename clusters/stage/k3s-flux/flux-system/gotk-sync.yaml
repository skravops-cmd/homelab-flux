# =============================================================================
# Flux bootstrap resources for the k3s (stage) cluster.
#
# GitRepository — Flux watches this GitHub repo for changes.
#   interval: 1m — polls for new commits every 60 seconds.
#   timeout: 5m — increased from the 60s default because this k3s node has a
#     very slow internet connection (~500 KiB/s, ~659 ms latency to GitHub).
#     The default timeout caused "context deadline exceeded" errors during
#     git ls-remote operations.
#   secretRef: flux-system — contains the GITHUB_TOKEN for authentication.
#
# Kustomization — Flux applies the manifests found at the given path.
#   interval: 10m — reconciles the cluster state every 10 minutes.
#   path: ./clusters/stage/k3s-flux — the root kustomization for this cluster.
#   prune: true — deletes resources from the cluster when removed from Git.
# =============================================================================
# This manifest was generated by flux. DO NOT EDIT.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  timeout: 5m
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: https://github.com/skravops-cmd/homelab-flux.git
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/stage/k3s-flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
