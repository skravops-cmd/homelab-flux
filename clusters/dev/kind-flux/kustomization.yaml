# Root Kustomization for the kind (dev) cluster.
# This is the entry point referenced by gotk-sync.yaml's path.
# It applies the dev overlay for each app and all shared infrastructure.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../apps/nginx/overlays/dev
  - ../../../apps/uptime-kuma/overlays/dev
  - ../../../apps/homepage/overlays/dev
  - ../../../infrastructure/traefik/overlays/dev
  - ../../../infrastructure/sources/helmrepositories
  - ../../../infrastructure/cert-manager/overlays/dev
