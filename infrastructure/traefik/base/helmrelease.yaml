# HelmRelease for Traefik ingress controller.
# Mirrors the default k3s Traefik deployment as closely as possible:
#   - system-cluster-critical priority
#   - kubernetesIngress provider with publishedService enabled
#   - default IngressClass
#   - tolerations for control-plane nodes
#   - LoadBalancer service type (k3s ServiceLB assigns the IP;
#     on kind, use: kubectl port-forward -n kube-system svc/traefik 8080:80 8443:443)
#
# Chart source: official Traefik Helm chart (helm.traefik.io/traefik).
# The official image is used (not rancher-mirrored) — functionally identical.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: "33.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    priorityClassName: system-cluster-critical

    providers:
      kubernetesIngress:
        publishedService:
          enabled: true

    ingressClass:
      enabled: true
      isDefaultClass: true

    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443

    service:
      type: LoadBalancer
