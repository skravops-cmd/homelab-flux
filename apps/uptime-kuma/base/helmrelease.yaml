# HelmRelease for Uptime Kuma — an uptime monitoring dashboard.
# Installed via the HelmForge Helm chart repository.
#
# Timeouts are set to 30m because the k3s stage cluster has a slow internet
# connection (~500 KiB/s) and the Docker image is ~400 MB, so pulling can
# take 15+ minutes. The default 5m Helm timeout would always fail there.
#
# remediation.retries: -1 means "retry forever" so Flux keeps trying
# until the image eventually finishes pulling and the pod starts.

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 5m
  install:
    timeout: 30m
    remediation:
      retries: -1
  upgrade:
    timeout: 30m
    remediation:
      retries: -1
  chart:
    spec:
      chart: uptime-kuma
      version: "1.5.9"
      sourceRef:
        kind: HelmRepository
        name: helmforge
        namespace: flux-system
  values:
    persistence:
      enabled: true
      size: 2Gi
