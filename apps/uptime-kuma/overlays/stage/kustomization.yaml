# Stage overlay for uptime-kuma.
# Currently identical to base — no stage-specific patches yet.
# Exists so the cluster kustomization can reference a consistent path
# (overlays/<env>) for every app.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - path: patch-ingress.yaml
    target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: uptime-kuma
