# Flux-system Kustomization for the k3s (stage) cluster.
# Bundles the core Flux components (controllers + bootstrap sync config).
# gotk-components.yaml is auto-generated by `flux install` — do not edit.
# gotk-sync.yaml is auto-generated by `flux bootstrap` — do not edit.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
