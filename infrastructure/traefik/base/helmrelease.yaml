# HelmRelease for Traefik ingress controller.
# Mirrors the default k3s Traefik deployment as closely as possible:
#   - system-cluster-critical priority
#   - kubernetesIngress provider with publishedService enabled
#   - default IngressClass
#   - tolerations for control-plane nodes
#   - LoadBalancer service with hostPort 80/443 (k3s ServiceLB disabled
#     via annotation to prevent svclb daemonset conflict);
#     Dashboard on port 9000 / nodePort 32080 (internal LAN only, not tunneled);
#     on kind, use: kubectl port-forward -n kube-system svc/traefik 9000:9000)
#
# Chart source: official Traefik Helm chart (helm.traefik.io/traefik).
# The official image is used (not rancher-mirrored) — functionally identical.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: kube-system
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: "33.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    priorityClassName: system-cluster-critical

    providers:
      kubernetesIngress:
        publishedService:
          enabled: true

    ingressClass:
      enabled: true
      isDefaultClass: true

    tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    api:
      dashboard: true
      debug: false

    ports:
      web:
        port: 8000
        hostPort: 80
      websecure:
        port: 8443
        hostPort: 443
      traefik:
        port: 9000
        expose:
          default: true
        nodePort: 32080

    service:
      type: LoadBalancer
      annotations:
        svccontroller.k3s.cattle.io/enablelb: "false"
