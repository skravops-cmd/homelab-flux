apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  proxmox.yaml: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Observability:
        - Uptime Kuma:
            href: http://uptime-kuma.uptime-kuma:3001
            description: Service health monitoring
        - Homepage:
            href: http://homepage.homepage:3000
            description: Cluster dashboard
    - Infrastructure:
        - Nginx:
            href: http://nginx.nginx
            description: Web server
        - Traefik:
            href: http://traefik.kube-system:9000
            description: Ingress controller admin
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
