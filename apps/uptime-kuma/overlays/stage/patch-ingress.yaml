apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  rules:
    - host: uptime.skravops-cmd.space
  tls:
    - hosts:
        - uptime.skravops-cmd.space
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: uptime-kuma-tls
  namespace: uptime-kuma
spec:
  dnsNames:
    - uptime.skravops-cmd.space
