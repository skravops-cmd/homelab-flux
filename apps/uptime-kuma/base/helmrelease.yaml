apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  interval: 5m
  chart:
    spec:
      chart: uptime-kuma
      version: "1.5.9"
      sourceRef:
        kind: HelmRepository
        name: helmforge
        namespace: flux-system
  values:
    persistence:
      enabled: true
      size: 2Gi
